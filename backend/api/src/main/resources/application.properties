# NESTOR API - Spring Boot on Lambda
spring.main.banner-mode=off

# Logging
logging.level.com.nestor=INFO
logging.level.org.springframework.security=WARN

# Disable default Spring Boot embedded server configuration for Lambda
# (aws-serverless-java-container handles the request lifecycle)
spring.main.web-application-type=servlet

# Jackson
spring.jackson.default-property-inclusion=non_null

# These values MUST be set via environment variables (Lambda config or .env)
# AURORA_CLUSTER_ARN=  (from terraform/5_database output)
# AURORA_SECRET_ARN=   (from terraform/5_database output)
# SQS_QUEUE_URL=       (from terraform/6_agents output)
# CLERK_JWKS_URL=      (from your Clerk dashboard)