# Spring Cloud Function routing
spring.cloud.function.definition=taggerFunction
# Set to 'servlet' for local testing, 'none' for Lambda deployment
spring.main.web-application-type=${WEB_TYPE:none}

# ── Bedrock ──────────────────────────────────────────────────────────────────
nestor.bedrock.model-id=${BEDROCK_MODEL_ID:openai.gpt-oss-120b-1:0}
nestor.bedrock.region=${BEDROCK_REGION:us-east-1}

# ── Aurora Data API ──────────────────────────────────────────────────────────
nestor.aurora.cluster-arn=${AURORA_CLUSTER_ARN:}
nestor.aurora.secret-arn=${AURORA_SECRET_ARN:}
nestor.aurora.database=${DATABASE_NAME:alex}
nestor.aurora.region=${DEFAULT_AWS_REGION:us-east-1}

logging.level.root=INFO