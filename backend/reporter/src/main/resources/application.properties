spring.cloud.function.definition=reporterFunction
spring.main.web-application-type=${WEB_TYPE:servlet}

# Bedrock
nestor.bedrock.model-id=${BEDROCK_MODEL_ID:openai.gpt-oss-120b-1:0}
nestor.bedrock.region=${BEDROCK_REGION:us-east-1}

# Aurora Data API
nestor.aurora.cluster-arn=${AURORA_CLUSTER_ARN:}
nestor.aurora.secret-arn=${AURORA_SECRET_ARN:}
nestor.aurora.database=${DATABASE_NAME:alex}
nestor.aurora.region=${DEFAULT_AWS_REGION:us-east-1}

# SageMaker
nestor.sagemaker.endpoint=${SAGEMAKER_ENDPOINT:alex-embedding-endpoint}
nestor.sagemaker.region=${DEFAULT_AWS_REGION:us-east-1}

# Judge guardrail
nestor.reporter.guard-score=${GUARD_AGAINST_SCORE:0.3}

logging.level.root=INFO
