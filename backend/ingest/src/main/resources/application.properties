# Spring Cloud Function routing
spring.cloud.function.definition=ingestFunction
# Set to 'servlet' for local testing, 'none' for Lambda deployment
spring.main.web-application-type=${WEB_TYPE:servlet}

# ── SageMaker ────────────────────────────────────────────────────────────────
nestor.sagemaker.endpoint=${SAGEMAKER_ENDPOINT:alex-embedding-endpoint}
nestor.sagemaker.region=${DEFAULT_AWS_REGION:us-east-1}

# ── S3 Vectors ───────────────────────────────────────────────────────────────
nestor.vectors.bucket=${VECTOR_BUCKET:}
nestor.vectors.index-name=${INDEX_NAME:financial-research}

logging.level.root=INFO
