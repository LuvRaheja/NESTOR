info:
  name: Invoke Planner (Orchestrator)
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/2015-03-31/functions/nestor-planner/invocations"
  headers:
    - name: X-Amz-Invocation-Type
      value: ""
      description: RequestResponse (sync, default) or Event (async)
      disabled: true
    - name: X-Amz-Log-Type
      value: ""
      description: Set to Tail to include execution log in response header
      disabled: true
  body:
    type: json
    data: |-
      {
        "job_id": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Planner orchestration result
    request:
      url: "{{baseUrl}}/2015-03-31/functions/nestor-planner/invocations"
      method: POST
      headers:
        - name: X-Amz-Invocation-Type
          value: ""
          description: RequestResponse (sync, default) or Event (async)
          disabled: true
        - name: X-Amz-Log-Type
          value: ""
          description: Set to Tail to include execution log in response header
          disabled: true
      body:
        type: json
        data: |-
          {
            "job_id": "00000000-0000-0000-0000-000000000001"
          }
    response:
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
