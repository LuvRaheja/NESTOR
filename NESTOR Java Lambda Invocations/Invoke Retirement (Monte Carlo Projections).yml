info:
  name: Invoke Retirement (Monte Carlo Projections)
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/2015-03-31/functions/nestor-retirement/invocations"
  headers:
    - name: X-Amz-Invocation-Type
      value: ""
      description: RequestResponse (sync, default) or Event (async)
      disabled: true
    - name: X-Amz-Log-Type
      value: ""
      description: Set to Tail to include execution log in response header
      disabled: true
  body:
    type: json
    data: |-
      {
        "job_id": "",
        "portfolio_data": {
          "target_retirement_income": 0,
          "years_until_retirement": 0,
          "current_age": 0,
          "accounts": [
            {}
          ]
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

