info:
  name: Invoke Charter (Visualization / Charts)
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/2015-03-31/functions/nestor-charter/invocations"
  headers:
    - name: X-Amz-Invocation-Type
      value: ""
      description: RequestResponse (sync, default) or Event (async)
      disabled: true
    - name: X-Amz-Log-Type
      value: ""
      description: Set to Tail to include execution log in response header
      disabled: true
  body:
    type: json
    data: |-
      {
        "job_id": "",
        "portfolio_data": {}
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

